<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .particle-bg {
            background: radial-gradient(circle at center, rgba(19, 91, 236, 0.15) 0%, transparent 70%),
                        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            background-color: #000000;
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(19, 91, 236, 0.6);
        }
        .metallic-text {
            background: linear-gradient(180deg, #FFFFFF 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display antialiased overflow-hidden">
<!-- Main Cinematic Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-center particle-bg overflow-hidden px-8">
<!-- Abstract Particle/Depth Layer -->
<div class="absolute inset-0 z-0 opacity-40" data-alt="Dense 3D particle system flying towards camera">
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-white rounded-full blur-[1px]"></div>
<div class="absolute top-3/4 left-1/2 w-2 h-2 bg-primary/40 rounded-full blur-[2px]"></div>
<div class="absolute top-1/2 right-1/4 w-1 h-1 bg-white rounded-full blur-[1px]"></div>
<div class="absolute top-2/3 right-1/3 w-1.5 h-1.5 bg-primary/30 rounded-full blur-[2px]"></div>
<div class="absolute top-1/5 right-1/2 w-0.5 h-0.5 bg-white rounded-full"></div>
<div class="absolute bottom-1/4 left-1/3 w-1 h-1 bg-white rounded-full blur-[1px]"></div>
</div>
<!-- Central Progress UI -->
<div class="relative z-10 w-full max-w-xs flex flex-col items-center">
<!-- Metallic Counter -->
<div class="mb-2">
<h1 class="metallic-text glow-text text-[64px] font-bold tracking-tighter leading-none italic">
                    74<span class="text-[32px] ml-1 opacity-80">%</span>
</h1>
</div>
<!-- Context Text -->
<div class="flex items-center gap-2 mb-8">
<span class="material-symbols-outlined text-primary text-sm">settings_input_component</span>
<p class="text-slate-100 text-[10px] font-bold tracking-[0.3em] uppercase opacity-90">
                    ATMOS_ENVIRONMENT_INIT
                </p>
</div>
<!-- High-Tech Progress Bar -->
<div class="w-full flex flex-col gap-4">
<div class="relative h-[2px] w-full bg-slate-800 rounded-full overflow-hidden">
<!-- Progress Fill -->
<div class="absolute top-0 left-0 h-full bg-primary shadow-[0_0_10px_#135bec]" style="width: 74%;"></div>
<!-- Animated Highlight (Visual representation of a sweep) -->
<div class="absolute top-0 left-0 h-full w-20 bg-gradient-to-r from-transparent via-white/30 to-transparent translate-x-[150px]"></div>
</div>
<!-- Footer Status Text -->
<div class="flex justify-between items-center w-full">
<p class="text-slate-500 text-[9px] font-medium tracking-widest uppercase">System: Optimized</p>
<p class="text-primary text-[9px] font-bold tracking-widest uppercase">Ver: 1.0.2-A</p>
</div>
</div>
</div>
<!-- Bottom Branding/Disclaimer -->
<div class="absolute bottom-12 left-0 right-0 flex flex-col items-center">
<p class="text-slate-400 text-[11px] font-light tracking-[0.4em] uppercase opacity-60 mb-2">
                Premium High-Tech Environment
            </p>
<div class="h-[1px] w-12 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
</div>
<!-- iOS Notch/Status Spacer Mockup (Hidden on actual physical devices typically) -->
<div class="absolute top-0 h-11 w-full flex items-center justify-between px-10">
<div class="text-white text-[13px] font-semibold opacity-40">9:41</div>
<div class="flex gap-1.5 items-center opacity-40">
<span class="material-symbols-outlined text-[16px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_very_low</span>
</div>
</div>
</div>
</body></html>
